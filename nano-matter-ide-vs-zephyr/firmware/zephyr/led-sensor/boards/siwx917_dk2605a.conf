# Board-specific config: SiWx917 Dev Kit (BRD2605A)
# This board has GPIO-only LEDs — no PWM hardware exposed in DTS.
# The application automatically falls back to GPIO blink mode.

# BLE on SiWx917: requires the SiLabs-specific BT driver.
# This auto-selects SILABS_SIWX91X_NWP, ENTROPY_GENERATOR, and BT_HCI_SETUP.
# The board DTS already has bt_hci0 { status = "okay" } and zephyr,bt-hci = &bt_hci0.
CONFIG_BT_SILABS_SIWX91X=y
