# Common Zephyr configuration for LED + Grid-EYE + BLE demo
# Board-specific configs are in boards/<board>.conf

# Kernel and console
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# GPIO for LEDs (used on all boards)
CONFIG_GPIO=y

# I2C for Grid-EYE AMG88xx sensor
CONFIG_I2C=y

# Sensor subsystem — the key Zephyr advantage
# One API for any sensor, hardware details in devicetree
CONFIG_SENSOR=y

# AMG88xx trigger mode: polling (default), no physical interrupt connected.
# The int-gpios in the overlay is a dummy pin — required by the binding but unused.
# CONFIG_AMG88XX_TRIGGER_NONE is the Kconfig default, stated here explicitly.
CONFIG_AMG88XX_TRIGGER_NONE=y

# BLE for temperature advertising
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="ZephyrGridEye"

# Power management — kernel auto-sleeps when all threads are in k_sleep().
# On EFR32MG24: enters EM2 deep sleep (1.3 µA) between thread wake-ups.
# On SiWx917: enters low-power idle. No code changes needed — automatic.
CONFIG_PM=y

# Enough threads for LED + sensor + BLE
CONFIG_MAIN_STACK_SIZE=2048
